<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hulunbuir | Welcome</title>
  <style>
    :root {
      --bg: #F7F4EC;
      --grass: #A8CFA8;
      --deep-green: #5E7D61;
      --sky: #DCEAF4;
      --text: #4A4A4A;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Georgia", "Times New Roman", serif;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("images/2.jpg") center/cover no-repeat;
      opacity: 0.95;
      z-index: 0;
    }

    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(247, 244, 236, 0.45);
      z-index: 1;
    }

    .hero {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 40px 28px;
      background: rgba(247, 244, 236, 0.35);
      border: 1px solid rgba(94, 125, 97, 0.18);
      border-radius: 24px;
      backdrop-filter: blur(4px);
      box-shadow: 0 10px 30px rgba(94, 125, 97, 0.08);
      animation: fadeUp 1s ease;
    }

    .small-title {
      font-family: Arial, sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--deep-green);
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--deep-green);
      margin-bottom: 14px;
    }

    .subtitle {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--text);
      margin-bottom: 28px;
    }

    .enter-btn {
      display: inline-block;
      padding: 12px 32px;
      text-decoration: none;
      border-radius: 999px;
      background: var(--deep-green);
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 0.92rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: 0.3s ease;
    }

    .enter-btn:hover {
      background: #4f6d53;
      transform: translateY(-2px);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .hero {
        width: 88%;
        padding: 32px 20px;
      }

      .subtitle {
        line-height: 1.6;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="small-title">Welcome</div>
    <h1>Hulunbuir</h1>
    <p class="subtitle">Where the grass meets the sky.</p>
    <a href="hulunbuir.html" class="enter-btn">Enter</a>
  </section>
</body>
</html>
